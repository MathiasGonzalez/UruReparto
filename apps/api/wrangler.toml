name = "urureparto-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"
APP_NAME = "UruReparto API"

[[d1_databases]]
binding = "DB"
database_name = "urureparto-db"
database_id = "YOUR_D1_DATABASE_ID"

[[kv_namespaces]]
binding = "SESSIONS"
id = "YOUR_KV_NAMESPACE_ID"

[env.staging]
name = "urureparto-api-staging"

[env.staging.vars]
ENVIRONMENT = "staging"

[env.staging.d1_databases]
binding = "DB"
database_name = "urureparto-db-staging"
database_id = "YOUR_STAGING_D1_DATABASE_ID"

[env.staging.kv_namespaces]
binding = "SESSIONS"
id = "YOUR_STAGING_KV_NAMESPACE_ID"

name = "urureparto-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"
APP_NAME = "UruReparto API"

[[d1_databases]]
binding = "DB"
database_name = "urureparto-db"
database_id = "YOUR_D1_DATABASE_ID"

[[kv_namespaces]]
binding = "SESSIONS"
id = "YOUR_KV_NAMESPACE_ID"

[env.dev]
name = "urureparto-api-dev"

[env.dev.vars]
ENVIRONMENT = "dev"

[env.dev.d1_databases]
binding = "DB"
database_name = "urureparto-db-dev"
database_id = "YOUR_DEV_D1_DATABASE_ID"

[env.dev.kv_namespaces]
binding = "SESSIONS"
id = "YOUR_DEV_KV_NAMESPACE_ID"

name: Mobile EAS Build

on:
  push:
    branches:
      - main
    paths:
      - "apps/mobile/**"
      - "packages/shared/**"
      - ".github/workflows/mobile-build.yml"
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to build"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - android
          - ios
      profile:
        description: "EAS build profile"
        required: true
        default: "preview"
        type: choice
        options:
          - preview
          - production

permissions:
  contents: read

jobs:
  type-check:
    name: Validate Mobile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Type check mobile
        run: npm run type-check --workspace=@urureparto/mobile

  build:
    name: Build Mobile with EAS
    runs-on: ubuntu-latest
    needs: type-check
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Setup Expo EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build (preview)
        working-directory: apps/mobile
        run: |
          PLATFORM=${{ github.event.inputs.platform || 'all' }}
          PROFILE=${{ github.event.inputs.profile || 'preview' }}
          eas build --platform $PLATFORM --profile $PROFILE --non-interactive
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.API_URL }}

name: Backoffice Deploy (Cloudflare Pages)

on:
  push:
    branches:
      - main
      - dev
    paths:
      - "apps/backoffice/**"
      - "packages/shared/**"
      - ".github/workflows/deploy-backoffice.yml"

permissions:
  contents: read

jobs:
  check:
    name: Build Backoffice
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build backoffice
        run: npm run build --workspace=@urureparto/backoffice

  deploy-dev:
    name: Deploy Backoffice to Dev
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build backoffice
        run: npm run build --workspace=@urureparto/backoffice

      - name: Deploy to Cloudflare Pages (dev)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/backoffice
          command: pages deploy dist --project-name=urureparto-backoffice --branch=dev

  deploy-production:
    name: Deploy Backoffice to Production
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build backoffice
        run: npm run build --workspace=@urureparto/backoffice

      - name: Deploy to Cloudflare Pages (production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/backoffice
          command: pages deploy dist --project-name=urureparto-backoffice
